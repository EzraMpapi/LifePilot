include: package:flutter_lints/flutter.yaml

linter:
  rules:
    # A few additions on top of flutter_lints' recommended set, chosen
    # because they catch real bugs (not just style) in a Riverpod +
    # clean-architecture codebase like this one.
    - prefer_const_constructors
    - prefer_const_literals_to_create_immutables
    - always_declare_return_types
    - avoid_print

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
